<div class="login-screen">
  <!-- Marca + decoración del fondo (queda detrás de la card) -->
  <div class="login-background" aria-hidden="true">
    <div class="background-glow background-glow--primary"></div>
    <div class="background-glow background-glow--secondary"></div>
  </div>

  <!-- Card central -->
  <div class="login-card" role="dialog" aria-labelledby="login-titulo">
    <div class="login-card__brand">
      <img src="assets/layout/images/logo.png" alt="Tododren" class="login-card__logo">
      <span class="login-card__brand-text">Tododren</span>
    </div>

    <h1 id="login-titulo" class="login-card__titulo">Sistema de Control<br>Tesorería y Fiscal</h1>
    <p class="login-card__subtitulo">Inicia sesión con tu cuenta corporativa para continuar.</p>

    <!-- Botón Microsoft -->
    <button class="ms-button"
            type="button"
            [disabled]="cargando()"
            (click)="loginWithMicrosoft()"
            aria-label="Iniciar sesión con Microsoft">
      <span *ngIf="!cargando()" class="ms-button__content">
        <!-- Logo oficial de Microsoft (4 cuadritos) -->
        <svg class="ms-button__icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1"  y="1"  width="10" height="10" fill="#F25022"/>
          <rect x="12" y="1"  width="10" height="10" fill="#7FBA00"/>
          <rect x="1"  y="12" width="10" height="10" fill="#00A4EF"/>
          <rect x="12" y="12" width="10" height="10" fill="#FFB900"/>
        </svg>
        <span>Iniciar sesión con Microsoft</span>
      </span>

      <span *ngIf="cargando()" class="ms-button__content ms-button__content--loading">
        <p-progressSpinner styleClass="ms-button__spinner" strokeWidth="3" animationDuration=".7s"></p-progressSpinner>
        <span>Conectando con Microsoft…</span>
      </span>
    </button>

    <!-- Aviso pequeño -->
    <p class="login-card__legal">
      <i class="pi pi-shield mr-2"></i>
      Solo personal autorizado. El acceso se valida contra Microsoft Entra ID (Azure AD).
    </p>
  </div>

  <!-- Footer -->
  <footer class="login-footer">
    © {{ anioActual }} Tododren · SCTF 09-2025
  </footer>
</div>
